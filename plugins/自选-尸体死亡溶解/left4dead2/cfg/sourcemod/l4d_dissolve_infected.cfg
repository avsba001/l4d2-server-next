// 16  = Hunter（猎人）
// 32  = Spitter（口水）
// 64  = Jockey（骑师）
// 128 = Charger（牛牛）
// 256 = Tank（坦克）
// 511 = 所有感染者（全部启用）
//
// 默认值: 511
l4d_dissolve_infected "511"

// 在指定游戏模式中启用插件（用逗号分隔，不要空格）
// 留空 = 所有模式启用
// 示例: "coop,versus"
// 默认值: 空
l4d_dissolve_modes ""

